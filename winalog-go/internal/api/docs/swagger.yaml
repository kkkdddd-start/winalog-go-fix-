info:
  contact: {}
paths:
  /api/alerts:
    get:
      consumes:
      - application/json
      description: Get a paginated list of alerts with optional filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 100
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by severity (critical/high/medium/low)
        in: query
        name: severity
        type: string
      - description: Filter by resolved status
        in: query
        name: resolved
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ListAlertsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: List alerts
      tags:
      - alerts
  /api/alerts/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an alert by ID
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Delete an alert
      tags:
      - alerts
    get:
      consumes:
      - application/json
      description: Get a single alert with explanation, recommendation, and matched
        events
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AlertWithDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get alert by ID
      tags:
      - alerts
  /api/alerts/{id}/false-positive:
    post:
      consumes:
      - application/json
      description: Mark an alert as a false positive with a reason
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      - description: False positive request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.MarkFalsePositiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Mark alert as false positive
      tags:
      - alerts
  /api/alerts/{id}/resolve:
    post:
      consumes:
      - application/json
      description: Mark an alert as resolved with optional notes
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      - description: Resolve request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ResolveAlertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Resolve an alert
      tags:
      - alerts
  /api/alerts/batch:
    post:
      consumes:
      - application/json
      description: Perform an action (resolve, false-positive, delete) on multiple
        alerts
      parameters:
      - description: Batch action request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.BatchAlertActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Batch alert action
      tags:
      - alerts
  /api/alerts/export:
    get:
      consumes:
      - application/json
      description: Export alerts in json or csv format
      parameters:
      - default: json
        description: Export format (json/csv)
        in: query
        name: format
        type: string
      - description: Filter by severity
        in: query
        name: severity
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Export alerts
      tags:
      - alerts
  /api/alerts/run-analysis:
    post:
      consumes:
      - application/json
      description: Run the alert analysis engine on all stored events
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RunAnalysisResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Run alert analysis
      tags:
      - alerts
  /api/alerts/stats:
    get:
      consumes:
      - application/json
      description: Get aggregated alert statistics including counts by severity, status,
        and top rules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.AlertStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get alert statistics
      tags:
      - alerts
  /api/alerts/trend:
    get:
      consumes:
      - application/json
      description: Get alert trend data over a specified number of days
      parameters:
      - default: 7
        description: Number of days for trend data
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.AlertTrend'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get alert trend
      tags:
      - alerts
  /api/analyze/{type}:
    post:
      consumes:
      - application/json
      description: Run a specific analyzer on stored events
      parameters:
      - description: Analyzer type (brute-force, login, kerberos, etc.)
        in: path
        name: type
        required: true
        type: string
      - description: Analysis parameters
        in: body
        name: request
        schema:
          $ref: '#/definitions/api.AnalyzeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AnalyzeResult'
        "400":
